<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
<rect width="1400" height="900" fill="white"/>
<defs>
  <filter id="sh-md" x="-12%" y="-12%" width="124%" height="136%">
    <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00000025"/>
  </filter>

  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#f0f2f8" stroke-width="0.5"/>
  </pattern>

  <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#2255bb"/>
    <stop offset="100%" style="stop-color:#4488ff"/>
  </linearGradient>
  <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#0e8a72"/>
    <stop offset="100%" style="stop-color:#1abc9c"/>
  </linearGradient>
  <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#e67a30"/>
    <stop offset="100%" style="stop-color:#ff9d5c"/>
  </linearGradient>
  <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#7d3c98"/>
    <stop offset="100%" style="stop-color:#a569bd"/>
  </linearGradient>
</defs>

<rect width="1400" height="900" fill="url(#grid)"/>

<!-- Title -->
<text x="700" y="50" font-size="32" font-weight="700" fill="#2c3e50" text-anchor="middle" letter-spacing="1">
  Claude Code is as good as you are
</text>
<text x="700" y="78" font-size="13" fill="#7788aa" text-anchor="middle" letter-spacing="2">
  完整学习路径：从工具使用到底层原理
</text>
<line x1="300" y1="95" x2="1100" y2="95" stroke="#d0d5dd" stroke-width="1.5"/>

<!-- PHASE 1: 基础认知 -->
<g id="phase1">
  <rect x="150" y="115" width="1100" height="130" rx="12" fill="white" filter="url(#sh-md)"/>
  <rect x="150" y="115" width="8" height="130" rx="4" fill="url(#blue-grad)"/>
  <text x="180" y="142" font-size="20" font-weight="700" fill="#3366cc">阶段 1：基础认知</text>
  <text x="180" y="162" font-size="12" fill="#7788aa">理解 Claude Code 的核心机制</text>

  <rect x="180" y="180" width="310" height="50" rx="8" fill="#f0f4ff" stroke="#3366cc" stroke-width="2"/>
  <text x="200" y="203" font-size="13" font-weight="600" fill="#3366cc">最小上下文集合</text>
  <text x="200" y="220" font-size="11" fill="#7788aa">精准 > 全量堆砌</text>

  <rect x="520" y="180" width="310" height="50" rx="8" fill="#f0f4ff" stroke="#3366cc" stroke-width="2"/>
  <text x="540" y="203" font-size="13" font-weight="600" fill="#3366cc">工作流</text>
  <text x="540" y="220" font-size="11" fill="#7788aa">问题 → 规划 → 执行 → 验证</text>

  <rect x="860" y="180" width="360" height="50" rx="8" fill="#f0f4ff" stroke="#3366cc" stroke-width="2"/>
  <text x="880" y="203" font-size="13" font-weight="600" fill="#3366cc">Agent Loop</text>
  <text x="880" y="220" font-size="11" fill="#7788aa">循环推理执行机制</text>
</g>

<!-- Arrow -->
<path d="M 700 255 L 700 275" stroke="#7788aa" stroke-width="3" fill="none"/>
<path d="M 695 275 L 700 285 L 705 275 Z" fill="#7788aa"/>

<!-- PHASE 2: 知识体系 -->
<g id="phase2">
  <rect x="150" y="295" width="1100" height="180" rx="12" fill="white" filter="url(#sh-md)"/>
  <rect x="150" y="295" width="8" height="180" rx="4" fill="url(#teal-grad)"/>
  <text x="180" y="322" font-size="20" font-weight="700" fill="#16a085">阶段 2：知识体系</text>
  <text x="180" y="342" font-size="12" fill="#7788aa">三层协作，知识飞轮加速</text>

  <!-- 上排3个，总宽1040，每个340，间距10 -->
  <rect x="180" y="358" width="340" height="50" rx="8" fill="#e8faf5" stroke="#16a085" stroke-width="2"/>
  <text x="200" y="381" font-size="13" font-weight="600" fill="#16a085">知识架构</text>
  <text x="200" y="398" font-size="11" fill="#7788aa">三层协作</text>

  <rect x="530" y="358" width="340" height="50" rx="8" fill="#e8faf5" stroke="#16a085" stroke-width="2"/>
  <text x="550" y="381" font-size="13" font-weight="600" fill="#16a085">Context 用量</text>
  <text x="550" y="398" font-size="11" fill="#7788aa">200k token</text>

  <rect x="880" y="358" width="340" height="50" rx="8" fill="#e8faf5" stroke="#16a085" stroke-width="2"/>
  <text x="900" y="381" font-size="13" font-weight="600" fill="#16a085">知识飞轮</text>
  <text x="900" y="398" font-size="11" fill="#7788aa">越用越强</text>

  <!-- 下排4个，总宽1040，每个252，间距约11 -->
  <rect x="180" y="423" width="252" height="40" rx="8" fill="#e8faf5" stroke="#16a085" stroke-width="2"/>
  <text x="200" y="448" font-size="13" font-weight="600" fill="#16a085">CLAUDE.md 项目宪法</text>

  <rect x="442" y="423" width="252" height="40" rx="8" fill="#e8faf5" stroke="#16a085" stroke-width="2"/>
  <text x="462" y="448" font-size="13" font-weight="600" fill="#16a085">Skills 按需加载</text>

  <rect x="704" y="423" width="252" height="40" rx="8" fill="#e8faf5" stroke="#16a085" stroke-width="2"/>
  <text x="724" y="448" font-size="13" font-weight="600" fill="#16a085">Memory 跨会话</text>

  <rect x="966" y="423" width="254" height="40" rx="8" fill="#e8faf5" stroke="#16a085" stroke-width="2"/>
  <text x="986" y="448" font-size="13" font-weight="600" fill="#16a085">Subagents 隔离操作</text>
</g>

<!-- Arrow -->
<path d="M 700 485 L 700 505" stroke="#7788aa" stroke-width="3" fill="none"/>
<path d="M 695 505 L 700 515 L 705 505 Z" fill="#7788aa"/>

<!-- PHASE 3: 实战方法 -->
<g id="phase3">
  <rect x="150" y="525" width="1100" height="110" rx="12" fill="white" filter="url(#sh-md)"/>
  <rect x="150" y="525" width="8" height="110" rx="4" fill="url(#orange-grad)"/>
  <text x="180" y="552" font-size="20" font-weight="700" fill="#ff8c42">阶段 3：实战方法</text>
  <text x="180" y="572" font-size="12" fill="#7788aa">结构化工作流 + 有效沟通</text>

  <rect x="180" y="590" width="510" height="35" rx="8" fill="#fff8f0" stroke="#ff8c42" stroke-width="2"/>
  <text x="200" y="614" font-size="13" font-weight="600" fill="#ff8c42">Plan Mode：先规划再动手，思考与行动解耦</text>

  <rect x="710" y="590" width="510" height="35" rx="8" fill="#fff8f0" stroke="#ff8c42" stroke-width="2"/>
  <text x="730" y="614" font-size="13" font-weight="600" fill="#ff8c42">有效对话与会话管理：沟通方式决定结果质量</text>
</g>

<!-- Arrow -->
<path d="M 700 645 L 700 665" stroke="#7788aa" stroke-width="3" fill="none"/>
<path d="M 695 665 L 700 675 L 705 665 Z" fill="#7788aa"/>

<!-- PHASE 4: 提示词工程 -->
<g id="phase4">
  <rect x="150" y="685" width="1100" height="195" rx="12" fill="white" filter="url(#sh-md)"/>
  <rect x="150" y="685" width="8" height="195" rx="4" fill="url(#purple-grad)"/>
  <text x="180" y="712" font-size="20" font-weight="700" fill="#8e44ad">阶段 4：提示词工程</text>
  <text x="180" y="732" font-size="12" fill="#7788aa">理解底层原理，写出更好的 CLAUDE.md 和 Skills</text>

  <rect x="180" y="750" width="200" height="115" rx="8" fill="#f3e5f5" stroke="#8e44ad" stroke-width="2"/>
  <text x="200" y="773" font-size="13" font-weight="600" fill="#8e44ad">K-shot 提示</text>
  <text x="200" y="790" font-size="11" fill="#7788aa">示例学习</text>
  <text x="200" y="807" font-size="10" fill="#95a5a6">质量 > 数量</text>
  <text x="200" y="822" font-size="10" fill="#95a5a6">Skills description</text>
  <text x="200" y="837" font-size="10" fill="#95a5a6">必须带具体例子</text>
  <text x="200" y="852" font-size="10" fill="#95a5a6">成功率 10% → 90%</text>

  <rect x="400" y="750" width="200" height="115" rx="8" fill="#f3e5f5" stroke="#8e44ad" stroke-width="2"/>
  <text x="420" y="773" font-size="13" font-weight="600" fill="#8e44ad">CoT 思维链</text>
  <text x="420" y="790" font-size="11" fill="#7788aa">逐步推理</text>
  <text x="420" y="807" font-size="10" fill="#95a5a6">"Think step by step"</text>
  <text x="420" y="822" font-size="10" fill="#95a5a6">准确率 1% → 60%</text>
  <text x="420" y="837" font-size="10" fill="#95a5a6">Plan Mode 自动使用</text>
  <text x="420" y="852" font-size="10" fill="#95a5a6">展示推理步骤</text>

  <rect x="620" y="750" width="200" height="115" rx="8" fill="#f3e5f5" stroke="#8e44ad" stroke-width="2"/>
  <text x="640" y="773" font-size="13" font-weight="600" fill="#8e44ad">Self-Consistency</text>
  <text x="640" y="790" font-size="11" fill="#7788aa">多次投票</text>
  <text x="640" y="807" font-size="10" fill="#95a5a6">temperature=1</text>
  <text x="640" y="822" font-size="10" fill="#95a5a6">运行5次投票</text>
  <text x="640" y="837" font-size="10" fill="#95a5a6">准确率 40% → 85%</text>
  <text x="640" y="852" font-size="10" fill="#95a5a6">多样性推理</text>

  <rect x="840" y="750" width="190" height="115" rx="8" fill="#f3e5f5" stroke="#8e44ad" stroke-width="2"/>
  <text x="860" y="773" font-size="13" font-weight="600" fill="#8e44ad">RAG 检索增强</text>
  <text x="860" y="790" font-size="11" fill="#7788aa">文档注入</text>
  <text x="860" y="807" font-size="10" fill="#95a5a6">Context: {文档}</text>
  <text x="860" y="822" font-size="10" fill="#95a5a6">"use ONLY this"</text>
  <text x="860" y="837" font-size="10" fill="#95a5a6">Skills 就是 RAG</text>
  <text x="860" y="852" font-size="10" fill="#95a5a6">防止幻觉</text>

  <rect x="1050" y="750" width="170" height="115" rx="8" fill="#f3e5f5" stroke="#8e44ad" stroke-width="2"/>
  <text x="1070" y="773" font-size="13" font-weight="600" fill="#8e44ad">Reflexion</text>
  <text x="1070" y="790" font-size="11" fill="#7788aa">错误反馈</text>
  <text x="1070" y="807" font-size="10" fill="#95a5a6">Previous: {代码}</text>
  <text x="1070" y="822" font-size="10" fill="#95a5a6">Failures: {错误}</text>
  <text x="1070" y="837" font-size="10" fill="#95a5a6">"分析并改进"</text>
  <text x="1070" y="852" font-size="10" fill="#95a5a6">针对性修复</text>
</g>

</svg>