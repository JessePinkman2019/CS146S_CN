<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>K-shot 提示 - 通过示例学习</title>
<style>
  body {
    margin: 0;
    padding: 20px;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
</style>
</head>
<body>
<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="sh-sm" x="-8%" y="-8%" width="116%" height="124%">
    <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#00000018"/>
  </filter>
  <filter id="sh-md" x="-12%" y="-12%" width="124%" height="136%">
    <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#00000028"/>
  </filter>

  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#f0f2f8" stroke-width="0.5"/>
  </pattern>

  <linearGradient id="header-grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#ff8c42"/>
    <stop offset="100%" style="stop-color:#ffaa66"/>
  </linearGradient>
</defs>

<rect width="1400" height="900" fill="url(#grid)"/>

<!-- Title -->
<text x="700" y="50" font-size="32" font-weight="700" fill="#2c3e50" text-anchor="middle">
  K-shot 提示：示例的质量 > 数量
</text>
<text x="700" y="85" font-size="16" fill="#7788aa" text-anchor="middle">
  提示词里加示例，模型就能学会模式
</text>

<!-- ========== LEFT: Bad Prompt ========== -->
<g id="bad-prompt">
  <rect x="100" y="130" width="600" height="700" rx="12" fill="white" filter="url(#sh-md)"/>
  <rect x="100" y="130" width="600" height="50" rx="12" fill="#e74c3c"/>
  <rect x="100" y="168" width="600" height="12" fill="#e74c3c"/>

  <text x="400" y="162" font-size="22" font-weight="700" fill="white" text-anchor="middle">
    ❌ 0-shot 提示词
  </text>

  <!-- Prompt -->
  <rect x="130" y="210" width="540" height="100" rx="8" fill="#fff5f5" stroke="#e74c3c" stroke-width="2"/>
  <text x="150" y="235" font-size="14" font-weight="700" fill="#e74c3c">
    System Prompt:
  </text>
  <text x="150" y="260" font-size="12" fill="#5a6c7d">
    "Reverse the word"
  </text>
  <text x="150" y="285" font-size="14" font-weight="700" fill="#2c3e50">
    User: httpstatus
  </text>

  <!-- Arrow -->
  <path d="M 400 330 L 400 360" stroke="#e74c3c" stroke-width="3" fill="none"/>
  <path d="M 395 360 L 400 370 L 405 360 Z" fill="#e74c3c"/>

  <!-- Result -->
  <rect x="130" y="390" width="540" height="120" rx="8" fill="#fff5f5" stroke="#e74c3c" stroke-width="2"/>
  <text x="150" y="420" font-size="14" font-weight="700" fill="#e74c3c">
    模型输出：
  </text>
  <text x="150" y="450" font-size="13" fill="#5a6c7d">
    "sutatsptth" ✗ 错误
  </text>
  <text x="150" y="475" font-size="12" fill="#7788aa">
    或 "http status" ✗ 理解成两个词
  </text>
  <text x="150" y="495" font-size="12" fill="#7788aa">
    或 "STATUS HTTP" ✗ 完全错误
  </text>

  <!-- Problem -->
  <rect x="130" y="530" width="540" height="270" rx="8" fill="#fff5f5" stroke="#e74c3c" stroke-width="2"/>
  <text x="150" y="560" font-size="15" font-weight="700" fill="#e74c3c">
    为什么失败？
  </text>
  <text x="170" y="595" font-size="13" fill="#2c3e50">
    • 没有示例，模型不理解"反转"的具体含义
  </text>
  <text x="170" y="625" font-size="13" fill="#2c3e50">
    • 可能理解成：单词顺序反转
  </text>
  <text x="170" y="655" font-size="13" fill="#2c3e50">
    • 可能理解成：大小写转换
  </text>
  <text x="170" y="685" font-size="13" fill="#2c3e50">
    • 可能理解成：字母逐个反转
  </text>
  <text x="150" y="730" font-size="13" fill="#7788aa" font-style="italic">
    成功率：约 10%
  </text>
  <rect x="150" y="750" width="500" height="35" rx="6" fill="#ffe5e5"/>
  <text x="400" y="775" font-size="13" font-weight="600" fill="#e74c3c" text-anchor="middle">
    提示词缺少具体示例，模型只能猜测
  </text>
</g>

<!-- ========== RIGHT: Good Prompt ========== -->
<g id="good-prompt">
  <rect x="750" y="130" width="600" height="700" rx="12" fill="white" filter="url(#sh-md)"/>
  <rect x="750" y="130" width="600" height="50" rx="12" fill="#27ae60"/>
  <rect x="750" y="168" width="600" height="12" fill="#27ae60"/>

  <text x="1050" y="162" font-size="22" font-weight="700" fill="white" text-anchor="middle">
    ✅ Few-shot 提示词
  </text>

  <!-- Prompt with examples -->
  <rect x="780" y="210" width="540" height="280" rx="8" fill="#f0fff4" stroke="#27ae60" stroke-width="2"/>
  <text x="800" y="235" font-size="14" font-weight="700" fill="#27ae60">
    System Prompt:
  </text>
  <text x="800" y="260" font-size="12" fill="#5a6c7d">
    "Reverse letters in a word. Examples:
  </text>
  <text x="800" y="285" font-size="12" fill="#2c3e50" font-weight="600">
    Word: 'http' → Reversed: 'ptth'
  </text>
  <text x="800" y="310" font-size="12" fill="#2c3e50" font-weight="600">
    Word: 'status' → Reversed: 'sutats'
  </text>
  <text x="800" y="335" font-size="12" fill="#2c3e50" font-weight="600">
    Word: 'teststatus' → Reversed: 'sutatstset'
  </text>
  <text x="800" y="365" font-size="12" fill="#7788aa">
    Process: Take letters from right to left."
  </text>
  <text x="800" y="395" font-size="14" font-weight="700" fill="#2c3e50">
    User: httpstatus
  </text>
  <text x="800" y="420" font-size="11" fill="#27ae60" font-style="italic">
    关键：示例结构相似（长度10+，复合词）
  </text>
  <text x="800" y="440" font-size="11" fill="#27ae60" font-style="italic">
    关键：展示完整过程
  </text>
  <text x="800" y="460" font-size="11" fill="#27ae60" font-style="italic">
    关键：3个示例（Few-shot）
  </text>

  <!-- Arrow -->
  <path d="M 1050 510 L 1050 540" stroke="#27ae60" stroke-width="3" fill="none"/>
  <path d="M 1045 540 L 1050 550 L 1055 540 Z" fill="#27ae60"/>

  <!-- Result -->
  <rect x="780" y="570" width="540" height="80" rx="8" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
  <text x="800" y="600" font-size="14" font-weight="700" fill="#27ae60">
    模型输出：
  </text>
  <text x="800" y="630" font-size="15" fill="#2c3e50" font-weight="600">
    "sutatsptth" ✅ 正确！
  </text>

  <!-- Success -->
  <rect x="780" y="670" width="540" height="130" rx="8" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
  <text x="800" y="700" font-size="15" font-weight="700" fill="#27ae60">
    为什么成功？
  </text>
  <text x="820" y="730" font-size="13" fill="#2c3e50">
    ✓ 示例展示了具体操作
  </text>
  <text x="820" y="755" font-size="13" fill="#2c3e50">
    ✓ 结构相似（复合词 → 复合词）
  </text>
  <text x="820" y="780" font-size="13" fill="#7788aa" font-style="italic">
    成功率：约 90%
  </text>
</g>

<!-- ========== BOTTOM: Key Insight ========== -->
<g id="bottom-insight">
  <rect x="200" y="850" width="1000" height="30" rx="6" fill="#fff8f0" stroke="#ff8c42" stroke-width="1"/>

  <text x="700" y="872" font-size="14" font-weight="600" fill="#2c3e50" text-anchor="middle">
    💡 提示词模板：任务描述 + 3个结构相似的示例 + 过程说明 → Skills description 就这么写
  </text>
</g>

</svg>
</body>
</html>
