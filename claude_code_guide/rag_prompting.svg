<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
<rect width="1400" height="900" fill="white"/>
<defs><filter id="sh-md"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#00000028"/></filter><pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M 30 0 L 0 0 0 30" fill="none" stroke="#f0f2f8" stroke-width="0.5"/></pattern><linearGradient id="header-grad"><stop offset="0%" style="stop-color:#ff8c42"/><stop offset="100%" style="stop-color:#ffaa66"/></linearGradient></defs>
<rect width="1400" height="900" fill="url(#grid)"/>
<text x="700" y="50" font-size="32" font-weight="700" fill="#2c3e50" text-anchor="middle">RAG：提示词里注入外部文档</text>
<text x="700" y="85" font-size="16" fill="#7788aa" text-anchor="middle">Context: {文档} + Task: {问题} → 基于事实回答</text>

<g id="left"><rect x="100" y="130" width="600" height="700" rx="12" fill="white" filter="url(#sh-md)"/><rect x="100" y="130" width="600" height="50" rx="12" fill="#e74c3c"/><rect x="100" y="168" width="600" height="12" fill="#e74c3c"/><text x="400" y="162" font-size="22" font-weight="700" fill="white" text-anchor="middle">❌ 无 RAG 提示词</text>
<rect x="130" y="210" width="540" height="100" rx="8" fill="#fff5f5" stroke="#e74c3c" stroke-width="2"/><text x="150" y="235" font-size="14" font-weight="700" fill="#e74c3c">Prompt:</text><text x="150" y="260" font-size="12" fill="#5a6c7d">"写一个Python函数调用API获取用户名"</text><text x="150" y="285" font-size="12" fill="#7788aa" font-style="italic">（没有提供API文档）</text>
<path d="M 400 330 L 400 360" stroke="#e74c3c" stroke-width="3" fill="none"/><path d="M 395 360 L 400 370 L 405 360 Z" fill="#e74c3c"/>
<rect x="130" y="390" width="540" height="180" rx="8" fill="#fff5f5" stroke="#e74c3c" stroke-width="2"/><text x="150" y="420" font-size="14" font-weight="700" fill="#e74c3c">模型输出（幻觉）:</text><text x="170" y="450" font-size="11" fill="#5a6c7d" font-family="monospace">def fetch_user(id):</text><text x="190" y="475" font-size="11" fill="#5a6c7d" font-family="monospace">url = "http://api.com/user"</text><text x="190" y="500" font-size="11" fill="#5a6c7d" font-family="monospace"># 编造的URL</text><text x="190" y="525" font-size="11" fill="#5a6c7d" font-family="monospace"># 缺少认证头</text><text x="190" y="550" font-size="11" fill="#5a6c7d" font-family="monospace"># 无法运行</text>
<rect x="130" y="590" width="540" height="210" rx="8" fill="#fff5f5" stroke="#e74c3c" stroke-width="2"/><text x="150" y="620" font-size="15" font-weight="700" fill="#e74c3c">问题：</text><text x="170" y="655" font-size="13" fill="#2c3e50">• 模型不知道真实API文档</text><text x="170" y="685" font-size="13" fill="#2c3e50">• 编造URL、参数、认证方式</text><text x="170" y="715" font-size="13" fill="#2c3e50">• 产生幻觉（Hallucination）</text><text x="170" y="745" font-size="13" fill="#2c3e50">• 代码无法运行</text><text x="150" y="780" font-size="13" fill="#7788aa" font-style="italic">提示词缺少外部知识</text></g>

<g id="right"><rect x="750" y="130" width="600" height="700" rx="12" fill="white" filter="url(#sh-md)"/><rect x="750" y="130" width="600" height="50" rx="12" fill="#e67e22"/><rect x="750" y="168" width="600" height="12" fill="#e67e22"/><text x="1050" y="162" font-size="22" font-weight="700" fill="white" text-anchor="middle">✅ RAG 提示词</text>
<rect x="780" y="210" width="540" height="280" rx="8" fill="#fff8f0" stroke="#e67e22" stroke-width="2"/><text x="800" y="235" font-size="14" font-weight="700" fill="#e67e22">Prompt:</text><text x="800" y="260" font-size="12" fill="#2c3e50" font-weight="600">Context (use ONLY this):</text><text x="820" y="285" font-size="11" fill="#5a6c7d" font-family="monospace">Base URL: https://api.example.com</text><text x="820" y="310" font-size="11" fill="#5a6c7d" font-family="monospace">GET /users/{id}</text><text x="820" y="335" font-size="11" fill="#5a6c7d" font-family="monospace">Header: X-API-Key: {api_key}</text><text x="820" y="360" font-size="11" fill="#5a6c7d" font-family="monospace">Response: {"name": "..."}</text><text x="800" y="390" font-size="12" fill="#2c3e50" font-weight="600">Task: 写函数调用API获取用户名</text><text x="800" y="415" font-size="11" fill="#27ae60" font-style="italic">关键：文档注入到提示词</text><text x="800" y="435" font-size="11" fill="#27ae60" font-style="italic">关键："use ONLY this"防止编造</text><text x="800" y="455" font-size="11" fill="#27ae60" font-style="italic">关键：完整API规范</text>
<path d="M 1050 510 L 1050 540" stroke="#e67e22" stroke-width="3" fill="none"/><path d="M 1045 540 L 1050 550 L 1055 540 Z" fill="#e67e22"/>
<rect x="780" y="570" width="540" height="160" rx="8" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/><text x="800" y="600" font-size="14" font-weight="700" fill="#27ae60">模型输出（基于文档）:</text><text x="820" y="630" font-size="11" fill="#5a6c7d" font-family="monospace">import requests</text><text x="820" y="650" font-size="11" fill="#5a6c7d" font-family="monospace">def fetch_user_name(id, key):</text><text x="840" y="670" font-size="11" fill="#5a6c7d" font-family="monospace">url=f"https://api.../users/{id}"</text><text x="840" y="690" font-size="11" fill="#5a6c7d" font-family="monospace">headers={"X-API-Key":key}</text><text x="840" y="710" font-size="11" fill="#5a6c7d" font-family="monospace">return r.json()["name"]</text>
<rect x="780" y="750" width="540" height="50" rx="8" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/><text x="1050" y="780" font-size="14" font-weight="700" fill="#27ae60" text-anchor="middle">✅ 代码正确，可直接运行</text></g>

<rect x="200" y="850" width="1000" height="30" rx="6" fill="#fff8f0" stroke="#ff8c42" stroke-width="1"/><text x="700" y="872" font-size="14" font-weight="600" fill="#2c3e50" text-anchor="middle">💡 提示词模板：Context: {文档} + "use ONLY this" + Task → Skills就是RAG，按需加载文档到context</text>
</svg>