<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Mode——思考与行动解耦</title>
<style>
  body { margin: 0; padding: 20px; background: #f5f7fa; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .container { display: flex; justify-content: center; }
</style>
</head>
<body>
<div class="container">
<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#aabbdd"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#00000015"/>
  </filter>
  <filter id="shadow-md" x="-10%" y="-10%" width="125%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#00000022"/>
  </filter>
  <filter id="shadow-gate" x="-15%" y="-5%" width="130%" height="115%">
    <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#f0a02040"/>
  </filter>
  <linearGradient id="grad-plan" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#3366cc"/>
    <stop offset="100%" stop-color="#7744cc"/>
  </linearGradient>
  <linearGradient id="grad-exec" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1a9a60"/>
    <stop offset="100%" stop-color="#e08020"/>
  </linearGradient>
  <linearGradient id="grad-phase1" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#4477ee"/>
    <stop offset="100%" stop-color="#3355bb"/>
  </linearGradient>
  <linearGradient id="grad-phase2" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#8855dd"/>
    <stop offset="100%" stop-color="#6633aa"/>
  </linearGradient>
  <linearGradient id="grad-phase3" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#22aa66"/>
    <stop offset="100%" stop-color="#118844"/>
  </linearGradient>
  <linearGradient id="grad-phase4" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#ee8822"/>
    <stop offset="100%" stop-color="#cc6600"/>
  </linearGradient>
  <linearGradient id="grad-gate" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#fffdf0"/>
    <stop offset="100%" stop-color="#fff8d0"/>
  </linearGradient>
</defs>

<!-- White background -->
<rect width="1200" height="700" fill="#ffffff" rx="12"/>

<!-- ═══ TITLE ═══ -->
<text x="600" y="44" text-anchor="middle" font-size="23" font-weight="bold" fill="#1a2a4a">Plan Mode——思考与行动解耦</text>
<text x="600" y="66" text-anchor="middle" font-size="13" fill="#7788aa">只读推理 · 零副作用 · 人工确认后执行</text>

<!-- ═══ LAYOUT (all y from 88, cards y=130~580)
  Phase1: x=18,  w=218  → right=236
  Phase2: x=248, w=218  → right=466
  Gate:   x=490, w=160  → right=650  (center=570... actually center=570)
  Phase3: x=674, w=218  → right=892
  Phase4: x=906, w=218  → right=1124 (but we have 1200 wide, so fine)

  PLAN zone:   x=10,  w=464  (wraps phase1+2, 10~474)
  NORMAL zone: x=666, w=466  (wraps phase3+4, 666~1132)
  Gate sits in gap 474~666, centered at 570
═══ -->

<!-- PLAN MODE zone background only -->
<rect x="10" y="88" width="464" height="510" rx="14" fill="#f0f4ff" stroke="#b8ccf0" stroke-width="1.5" filter="url(#shadow)"/>

<!-- NORMAL MODE zone background only -->
<rect x="666" y="88" width="466" height="510" rx="14" fill="#f0fff6" stroke="#a8d8b8" stroke-width="1.5" filter="url(#shadow)"/>

<!-- ═══ PHASE 1: 探索 x=18, w=218, center=127 ═══ -->
<rect x="18" y="130" width="218" height="450" rx="12" fill="#ffffff" stroke="#c8d8f8" stroke-width="1.5" filter="url(#shadow-md)"/>
<rect x="18" y="130" width="218" height="48" rx="12" fill="url(#grad-phase1)"/>
<rect x="18" y="164" width="218" height="14" fill="url(#grad-phase1)"/>
<circle cx="40" cy="154" r="13" fill="rgba(255,255,255,0.2)"/>
<text x="40" y="159" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">1</text>
<text x="127" y="149" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">探索</text>
<text x="127" y="165" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.85)">Read · Grep · 理解结构</text>
<circle cx="127" cy="232" r="38" fill="#eef3ff" stroke="#b8ccf0" stroke-width="1.5"/>
<text x="127" y="246" text-anchor="middle" font-size="36">🔍</text>
<text x="127" y="298" text-anchor="middle" font-size="10.5" fill="#334477">读文件，不写文件</text>
<text x="127" y="315" text-anchor="middle" font-size="10.5" fill="#334477">识别风险和依赖</text>
<text x="127" y="332" text-anchor="middle" font-size="10.5" fill="#334477">零副作用</text>
<rect x="30" y="346" width="194" height="118" rx="8" fill="#1e1e2e"/>
<text x="44" y="364" font-size="8.5" font-family="'Courier New',monospace" fill="#6c7086"># 读 skill + 读代码</text>
<text x="44" y="380" font-size="8.5" font-family="'Courier New',monospace" fill="#cba6f7">/attention  /moe  /hardware</text>
<text x="44" y="396" font-size="8.5" font-family="'Courier New',monospace" fill="#a6e3a1">read src/attention.c</text>
<text x="44" y="412" font-size="8.5" font-family="'Courier New',monospace" fill="#a6e3a1">read src/moe.c</text>
<text x="44" y="428" font-size="8.5" font-family="'Courier New',monospace" fill="#89b4fa">grep "__at(" src/</text>
<text x="44" y="444" font-size="8.5" font-family="'Courier New',monospace" fill="#89b4fa">python3 tm_address_allocator.py</text>

<!-- ═══ PHASE 2: 规划 x=248, w=218, center=357 ═══ -->
<rect x="248" y="130" width="218" height="450" rx="12" fill="#ffffff" stroke="#c8b8f0" stroke-width="1.5" filter="url(#shadow-md)"/>
<rect x="248" y="130" width="218" height="48" rx="12" fill="url(#grad-phase2)"/>
<rect x="248" y="164" width="218" height="14" fill="url(#grad-phase2)"/>
<circle cx="270" cy="154" r="13" fill="rgba(255,255,255,0.2)"/>
<text x="270" y="159" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">2</text>
<text x="357" y="149" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">规划</text>
<text x="357" y="165" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.85)">生成可审核的计划</text>
<circle cx="357" cy="232" r="38" fill="#f5f0ff" stroke="#c8b8f0" stroke-width="1.5"/>
<text x="357" y="246" text-anchor="middle" font-size="36">📋</text>
<text x="357" y="298" text-anchor="middle" font-size="10.5" fill="#334477">列出修改文件清单</text>
<text x="357" y="315" text-anchor="middle" font-size="10.5" fill="#334477">说明每步理由</text>
<text x="357" y="332" text-anchor="middle" font-size="10.5" fill="#334477">可直接编辑计划</text>
<rect x="260" y="346" width="194" height="118" rx="8" fill="#1e1e2e"/>
<text x="274" y="364" font-size="8.5" font-family="'Courier New',monospace" fill="#6c7086"># 输出分步计划</text>
<text x="274" y="380" font-size="8.5" font-family="'Courier New',monospace" fill="#cba6f7">1. 修改 Q/K/V __at() 声明</text>
<text x="274" y="396" font-size="8.5" font-family="'Courier New',monospace" fill="#cba6f7">2. 更新 barrier 同步点</text>
<text x="274" y="412" font-size="8.5" font-family="'Courier New',monospace" fill="#cba6f7">3. 跑 tm_address_allocator</text>
<text x="274" y="428" font-size="8.5" font-family="'Courier New',monospace" fill="#cba6f7">4. python3 compare.py 验证</text>
<text x="274" y="444" font-size="8.5" font-family="'Courier New',monospace" fill="#f38ba8">⚠ 确认无冲突再动手</text>

<!-- ═══ HUMAN GATE x=490, w=160, center=570, y=175~475 ═══ -->
<rect x="490" y="175" width="160" height="300" rx="14" fill="url(#grad-gate)" stroke="#f0a020" stroke-width="2.5" filter="url(#shadow-gate)"/>
<rect x="490" y="175" width="160" height="7" rx="7" fill="#f0a020"/>
<rect x="490" y="468" width="160" height="7" rx="7" fill="#f0a020"/>
<text x="570" y="222" text-anchor="middle" font-size="36">👤</text>
<text x="570" y="246" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a4400">审核确认</text>
<rect x="510" y="252" width="120" height="20" rx="5" fill="#f0a020"/>
<text x="570" y="266" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Shift+Tab</text>
<line x1="504" y1="280" x2="636" y2="280" stroke="#f0c060" stroke-width="1"/>
<!-- Circular loop arrow centered at 570,340 r=38 -->
<path d="M 570,302 A 38,38 0 1,1 532,340" fill="none" stroke="#f0a020" stroke-width="3" stroke-linecap="round"/>
<polygon points="524,332 532,348 540,334" fill="#f0a020"/>
<text x="570" y="334" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a4400">review</text>
<text x="570" y="350" text-anchor="middle" font-size="9.5" fill="#aa6600">→ modify</text>
<text x="570" y="365" text-anchor="middle" font-size="9.5" fill="#aa6600">→ re-review</text>
<text x="570" y="450" text-anchor="middle" font-size="9" fill="#886600">↺ 循环直到满意</text>

<!-- ═══ PHASE 3: 实现 x=674, w=218, center=783 ═══ -->
<rect x="674" y="130" width="218" height="450" rx="12" fill="#ffffff" stroke="#a8d8b8" stroke-width="1.5" filter="url(#shadow-md)"/>
<rect x="674" y="130" width="218" height="48" rx="12" fill="url(#grad-phase3)"/>
<rect x="674" y="164" width="218" height="14" fill="url(#grad-phase3)"/>
<circle cx="696" cy="154" r="13" fill="rgba(255,255,255,0.2)"/>
<text x="696" y="159" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">3</text>
<text x="783" y="149" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">实现</text>
<text x="783" y="165" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.85)">按计划编码 · 边写边验证</text>
<circle cx="783" cy="232" r="38" fill="#eefff4" stroke="#a8d8b8" stroke-width="1.5"/>
<text x="783" y="246" text-anchor="middle" font-size="36">⚙️</text>
<text x="783" y="298" text-anchor="middle" font-size="10.5" fill="#334477">逐步修改代码</text>
<text x="783" y="315" text-anchor="middle" font-size="10.5" fill="#334477">主动运行验证命令</text>
<text x="783" y="332" text-anchor="middle" font-size="10.5" fill="#334477">偏差立即报告</text>
<rect x="686" y="346" width="194" height="118" rx="8" fill="#1e1e2e"/>
<text x="700" y="364" font-size="8.5" font-family="'Courier New',monospace" fill="#6c7086"># 验证</text>
<text x="700" y="380" font-size="8.5" font-family="'Courier New',monospace" fill="#a6e3a1">python3 compare.py</text>
<text x="700" y="396" font-size="8.5" font-family="'Courier New',monospace" fill="#f38ba8">bit-wise 对齐才算成功</text>
<text x="700" y="412" font-size="8.5" font-family="'Courier New',monospace" fill="#89b4fa">tail -100 /tmp/build_*.log</text>
<text x="700" y="428" font-size="8.5" font-family="'Courier New',monospace" fill="#6c7086"># 不对齐 → Esc 打断</text>

<!-- ═══ PHASE 4: 提交 x=906, w=218, center=1015 ═══ -->
<rect x="906" y="130" width="218" height="450" rx="12" fill="#ffffff" stroke="#f0c878" stroke-width="1.5" filter="url(#shadow-md)"/>
<rect x="906" y="130" width="218" height="48" rx="12" fill="url(#grad-phase4)"/>
<rect x="906" y="164" width="218" height="14" fill="url(#grad-phase4)"/>
<circle cx="928" cy="154" r="13" fill="rgba(255,255,255,0.2)"/>
<text x="928" y="159" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">4</text>
<text x="1015" y="149" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">提交</text>
<text x="1015" y="165" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.85)">commit · /clear · 下一任务</text>
<circle cx="1015" cy="232" r="38" fill="#fff8ee" stroke="#f0c878" stroke-width="1.5"/>
<text x="1015" y="246" text-anchor="middle" font-size="36">🚀</text>
<text x="1015" y="298" text-anchor="middle" font-size="10.5" fill="#334477">生成 commit message</text>
<text x="1015" y="315" text-anchor="middle" font-size="10.5" fill="#334477">手动 git push</text>
<text x="1015" y="332" text-anchor="middle" font-size="10.5" fill="#334477">/clear 清空 context</text>
<rect x="918" y="346" width="194" height="118" rx="8" fill="#1e1e2e"/>
<text x="932" y="364" font-size="8.5" font-family="'Courier New',monospace" fill="#6c7086"># 收尾</text>
<text x="932" y="380" font-size="8.5" font-family="'Courier New',monospace" fill="#a6e3a1">git commit -m "[Fix]..."</text>
<text x="932" y="396" font-size="8.5" font-family="'Courier New',monospace" fill="#89b4fa">/clear → 新任务</text>

<!-- ═══ ZONE HEADERS (drawn last, always on top) ═══ -->
<rect x="10" y="88" width="464" height="36" rx="14" fill="url(#grad-plan)"/>
<rect x="10" y="108" width="464" height="16" fill="url(#grad-plan)"/>
<text x="242" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff" letter-spacing="1">PLAN MODE  ·  只读，不修改任何文件</text>

<rect x="666" y="88" width="466" height="36" rx="14" fill="url(#grad-exec)"/>
<rect x="666" y="108" width="466" height="16" fill="url(#grad-exec)"/>
<text x="899" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff" letter-spacing="1">NORMAL MODE  ·  执行，修改文件</text>

<!-- ═══ BOTTOM strip ═══ -->
<rect x="10" y="600" width="1180" height="58" rx="12" fill="#2d3a4a" filter="url(#shadow)"/>
<text x="600" y="624" text-anchor="middle" font-size="12" font-weight="bold" fill="#cba6f7">本质：把「思考」和「行动」解耦</text>
<text x="600" y="646" text-anchor="middle" font-size="11" fill="#c0cce0">Plan Mode 消耗 token 做推理，但零副作用 · 人工确认方向正确后，再切 Normal Mode 执行</text>

</svg>
</div>
</body>
</html>
