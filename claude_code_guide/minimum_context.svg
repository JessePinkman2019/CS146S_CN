<svg width="1200" height="620" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg">
<rect width="1200" height="620" fill="white"/>
  <defs>
    <!-- Drop shadow for center zone -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000018"/>
    </filter>
    <!-- Soft shadow for problem box -->
    <filter id="boxshadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#f0a03030"/>
    </filter>
    <!-- Cloud symbol -->
    <symbol id="cloud" viewBox="0 0 110 65">
      <path d="M 18,55 Q 5,55 5,43 Q 5,33 15,31 Q 13,14 28,12 Q 36,2 48,10 Q 55,3 65,10 Q 76,2 85,12 Q 100,13 100,30 Q 110,32 108,43 Q 107,55 94,55 Z"/>
    </symbol>
    <!-- Gradient for effectiveness curve -->
    <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cc8888" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#6699cc" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#3366cc" stop-opacity="1"/>
      <stop offset="70%" stop-color="#6699cc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#cc9944" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Gradient fill under curve -->
    <linearGradient id="curveFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6699cc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6699cc" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- White background -->
