<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 工作流</title>
<style>
  body { margin: 0; padding: 20px; background: #f5f7fa; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .container { display: flex; justify-content: center; align-items: center; }
</style>
</head>
<body>
<div class="container">
<svg width="1200" height="580" viewBox="0 0 1200 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aabbdd"/>
    </marker>
    <!-- Arrow marker for loop -->
    <marker id="arrowhead-loop" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0a0a0"/>
    </marker>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#00000015"/>
    </filter>
    <!-- Stronger shadow for highlighted zones -->
    <filter id="shadow-strong" x="-10%" y="-10%" width="125%" height="135%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#0000001e"/>
    </filter>
    <!-- Cloud symbol -->
    <symbol id="cloud" viewBox="0 0 110 65">
      <path d="M 18,55 Q 5,55 5,43 Q 5,33 15,31 Q 13,14 28,12 Q 36,2 48,10 Q 55,3 65,10 Q 76,2 85,12 Q 100,13 100,30 Q 110,32 108,43 Q 107,55 94,55 Z"/>
    </symbol>
  </defs>

  <!-- White background -->
  <rect width="1200" height="580" fill="#ffffff" rx="12"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a2a4a">Claude Code 工作流</text>
  <text x="600" y="62" text-anchor="middle" font-size="13" fill="#7788aa">从问题到解决的完整路径</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STAGE 1: 问题输入 (x: 30-150) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="140" width="130" height="300" rx="12" fill="#fff8ee" stroke="#f0a030" stroke-width="1.8" filter="url(#shadow)"/>
  <!-- Stage label -->
  <text x="95" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="#c07010">问题输入</text>
  <line x1="45" y1="175" x2="145" y2="175" stroke="#f0c070" stroke-width="1"/>

  <!-- Warning icon circle -->
  <circle cx="95" cy="215" r="26" fill="#fde8c0" stroke="#f0a030" stroke-width="1.5"/>
  <text x="95" y="221" text-anchor="middle" font-size="22" fill="#c07010">⚠</text>

  <!-- Example text -->
  <text x="95" y="265" text-anchor="middle" font-size="11" fill="#8a6020">示例问题：</text>
  <rect x="42" y="272" width="106" height="36" rx="6" fill="#fde8c0" stroke="#f0c070" stroke-width="1"/>
  <text x="95" y="287" text-anchor="middle" font-size="10" fill="#7a5010">M100精度</text>
  <text x="95" y="300" text-anchor="middle" font-size="10" fill="#7a5010">对不齐</text>

  <text x="95" y="340" text-anchor="middle" font-size="10" fill="#a07030">用户描述</text>
  <text x="95" y="354" text-anchor="middle" font-size="10" fill="#a07030">问题现象</text>
  <text x="95" y="368" text-anchor="middle" font-size="10" fill="#a07030">和期望</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Arrow 1→2 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="162" y1="290" x2="178" y2="290" stroke="#aabbdd" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STAGE 2: 上下文收集 (x: 185-320) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="185" y="140" width="140" height="300" rx="12" fill="#f0fff4" stroke="#a8d8b0" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="255" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a7a40">上下文收集</text>
  <line x1="200" y1="175" x2="310" y2="175" stroke="#a8d8b0" stroke-width="1"/>

  <!-- Cloud 1: Skills 知识库 -->
  <use href="#cloud" x="200" y="185" width="110" height="65" fill="#dce8ff" stroke="#90b0e8" stroke-width="1.2"/>
  <text x="255" y="213" text-anchor="middle" font-size="9.5" fill="#2a4a8a">Skills</text>
  <text x="255" y="225" text-anchor="middle" font-size="9.5" fill="#2a4a8a">知识库</text>

  <!-- Cloud 2: 代码探索 -->
  <use href="#cloud" x="200" y="258" width="110" height="65" fill="#dce8ff" stroke="#90b0e8" stroke-width="1.2"/>
  <text x="255" y="286" text-anchor="middle" font-size="9.5" fill="#2a4a8a">代码探索</text>
  <text x="255" y="298" text-anchor="middle" font-size="9.5" fill="#2a4a8a">Grep/Read</text>

  <!-- Cloud 3: 历史记忆 -->
  <use href="#cloud" x="200" y="330" width="110" height="65" fill="#dce8ff" stroke="#90b0e8" stroke-width="1.2"/>
  <text x="255" y="358" text-anchor="middle" font-size="9.5" fill="#2a4a8a">历史记忆</text>
  <text x="255" y="370" text-anchor="middle" font-size="9.5" fill="#2a4a8a">MEMORY.md</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Arrow 2→3 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="327" y1="290" x2="343" y2="290" stroke="#aabbdd" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STAGE 3: Plan 模式 (x: 350-480) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="350" y="130" width="135" height="320" rx="12" fill="#eef3ff" stroke="#b8ccf0" stroke-width="2" filter="url(#shadow-strong)"/>
  <text x="417" y="160" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a4a9a">Plan 模式</text>
  <line x1="365" y1="167" x2="470" y2="167" stroke="#b8ccf0" stroke-width="1"/>

  <!-- Plan document icon -->
  <rect x="385" y="178" width="64" height="78" rx="5" fill="#ffffff" stroke="#b8ccf0" stroke-width="1.5"/>
  <rect x="385" y="178" width="64" height="18" rx="5" fill="#c8d8f8"/>
  <rect x="385" y="190" width="64" height="6" rx="0" fill="#c8d8f8"/>
  <line x1="393" y1="208" x2="441" y2="208" stroke="#c8d8f8" stroke-width="2"/>
  <line x1="393" y1="216" x2="441" y2="216" stroke="#c8d8f8" stroke-width="2"/>
  <line x1="393" y1="224" x2="435" y2="224" stroke="#c8d8f8" stroke-width="2"/>
  <line x1="393" y1="232" x2="441" y2="232" stroke="#c8d8f8" stroke-width="2"/>
  <line x1="393" y1="240" x2="430" y2="240" stroke="#c8d8f8" stroke-width="2"/>
  <text x="417" y="188" text-anchor="middle" font-size="8" fill="#4a6aaa">PLAN</text>

  <!-- Steps -->
  <text x="417" y="278" text-anchor="middle" font-size="10" fill="#3a5aaa">分析问题</text>
  <text x="417" y="294" text-anchor="middle" font-size="10" fill="#3a5aaa">↓</text>
  <text x="417" y="310" text-anchor="middle" font-size="10" fill="#3a5aaa">拆解步骤</text>
  <text x="417" y="326" text-anchor="middle" font-size="10" fill="#3a5aaa">↓</text>
  <text x="417" y="342" text-anchor="middle" font-size="10" fill="#3a5aaa">方案确认</text>

  <!-- User approval badge -->
  <rect x="370" y="358" width="95" height="24" rx="12" fill="#d4edda" stroke="#82c99a" stroke-width="1.2"/>
  <text x="417" y="374" text-anchor="middle" font-size="10" fill="#2a7a40">用户审批 ✓</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Arrow 3→4 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="487" y1="290" x2="503" y2="290" stroke="#aabbdd" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STAGE 4: 执行 (x: 510-785) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="510" y="130" width="278" height="320" rx="12" fill="#f5f0ff" stroke="#c8b8f0" stroke-width="1.8" filter="url(#shadow-strong)"/>
  <text x="649" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#5a2a9a">执行</text>
  <line x1="525" y1="165" x2="773" y2="165" stroke="#c8b8f0" stroke-width="1"/>

  <!-- Card 1: Auto Edit -->
  <rect x="520" y="175" width="80" height="240" rx="8" fill="#e8f4ff" stroke="#7aaae8" stroke-width="1.5"/>
  <rect x="520" y="175" width="80" height="28" rx="8" fill="#b8d8f8"/>
  <rect x="520" y="195" width="80" height="8" rx="0" fill="#b8d8f8"/>
  <text x="560" y="193" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1a4a8a">Auto Edit</text>
  <text x="560" y="222" text-anchor="middle" font-size="9" fill="#2a5a9a">逐步确认</text>
  <text x="560" y="238" text-anchor="middle" font-size="9" fill="#4a6aaa">每次修改</text>
  <text x="560" y="252" text-anchor="middle" font-size="9" fill="#4a6aaa">需用户确认</text>
  <text x="560" y="270" text-anchor="middle" font-size="9" fill="#4a6aaa">适合敏感</text>
  <text x="560" y="284" text-anchor="middle" font-size="9" fill="#4a6aaa">操作场景</text>
  <!-- Tag -->
  <rect x="530" y="390" width="60" height="18" rx="9" fill="#ddeeff" stroke="#7aaae8" stroke-width="1"/>
  <text x="560" y="402" text-anchor="middle" font-size="8.5" fill="#1a4a8a">🔵 谨慎</text>

  <!-- Card 2: Plan 模式 (recommended) -->
  <rect x="609" y="175" width="80" height="240" rx="8" fill="#eef3ff" stroke="#9ab8f0" stroke-width="2"/>
  <!-- Highlight top -->
  <rect x="609" y="175" width="80" height="28" rx="8" fill="#9ab8f0"/>
  <rect x="609" y="195" width="80" height="8" rx="0" fill="#9ab8f0"/>
  <text x="649" y="193" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#ffffff">Plan 模式</text>
  <text x="649" y="222" text-anchor="middle" font-size="9" fill="#2a4a9a">先规划</text>
  <text x="649" y="236" text-anchor="middle" font-size="9" fill="#2a4a9a">再执行</text>
  <text x="649" y="254" text-anchor="middle" font-size="9" fill="#4a6aaa">规划可见</text>
  <text x="649" y="268" text-anchor="middle" font-size="9" fill="#4a6aaa">风险可控</text>
  <text x="649" y="284" text-anchor="middle" font-size="9" fill="#4a6aaa">推荐日常</text>
  <text x="649" y="298" text-anchor="middle" font-size="9" fill="#4a6aaa">使用</text>
  <!-- Tag -->
  <rect x="619" y="390" width="60" height="18" rx="9" fill="#d4edda" stroke="#82c99a" stroke-width="1"/>
  <text x="649" y="402" text-anchor="middle" font-size="8.5" fill="#2a7a40">🟢 推荐</text>

  <!-- Card 3: Yolo 模式 -->
  <rect x="698" y="175" width="80" height="240" rx="8" fill="#fff8ee" stroke="#f0c070" stroke-width="1.5"/>
  <rect x="698" y="175" width="80" height="28" rx="8" fill="#f8d898"/>
  <rect x="698" y="195" width="80" height="8" rx="0" fill="#f8d898"/>
  <text x="738" y="193" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#7a4a00">Yolo 模式</text>
  <text x="738" y="222" text-anchor="middle" font-size="9" fill="#8a5a10">全自动</text>
  <text x="738" y="236" text-anchor="middle" font-size="9" fill="#8a5a10">执行</text>
  <text x="738" y="254" text-anchor="middle" font-size="9" fill="#a07030">无需确认</text>
  <text x="738" y="268" text-anchor="middle" font-size="9" fill="#a07030">速度最快</text>
  <text x="738" y="284" text-anchor="middle" font-size="9" fill="#a07030">需谨慎</text>
  <text x="738" y="298" text-anchor="middle" font-size="9" fill="#a07030">使用</text>
  <!-- Tag -->
  <rect x="703" y="390" width="70" height="18" rx="9" fill="#fff3cc" stroke="#f0c070" stroke-width="1"/>
  <text x="738" y="402" text-anchor="middle" font-size="8" fill="#7a5000">🟡 高效/高风险</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Arrow 4→5 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="790" y1="290" x2="806" y2="290" stroke="#aabbdd" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STAGE 5: 验证 (x: 813-965) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="813" y="140" width="155" height="300" rx="12" fill="#f0fffe" stroke="#90d0cc" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="890" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a6a68">验证</text>
  <line x1="828" y1="175" x2="953" y2="175" stroke="#90d0cc" stroke-width="1"/>

  <!-- Verify icon -->
  <circle cx="890" cy="215" r="24" fill="#c8f0ee" stroke="#60b0ac" stroke-width="1.5"/>
  <text x="890" y="222" text-anchor="middle" font-size="20" fill="#1a6a68">✓</text>

  <!-- Item 1: compare.py -->
  <rect x="825" y="252" width="131" height="52" rx="7" fill="#ffffff" stroke="#90d0cc" stroke-width="1.2"/>
  <text x="890" y="270" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a6a68">精度验证</text>
  <rect x="833" y="276" width="115" height="20" rx="4" fill="#e0f8f6"/>
  <text x="890" y="290" text-anchor="middle" font-size="8.5" fill="#1a5a58" font-family="monospace">python3 compare.py</text>

  <!-- Item 2: tm_address_allocator.py -->
  <rect x="825" y="314" width="131" height="52" rx="7" fill="#ffffff" stroke="#90d0cc" stroke-width="1.2"/>
  <text x="890" y="332" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a6a68">地址检查</text>
  <rect x="833" y="338" width="115" height="20" rx="4" fill="#e0f8f6"/>
  <text x="890" y="352" text-anchor="middle" font-size="7.5" fill="#1a5a58" font-family="monospace">tm_address_allocator.py</text>

  <text x="890" y="390" text-anchor="middle" font-size="9" fill="#2a8a88">bit-wise 对齐</text>
  <text x="890" y="404" text-anchor="middle" font-size="9" fill="#2a8a88">才算成功</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Arrow 5→6 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="970" y1="290" x2="986" y2="290" stroke="#aabbdd" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STAGE 6: 结果 (x: 993-1170) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Success badge -->
  <rect x="993" y="185" width="175" height="80" rx="10" fill="#d4edda" stroke="#82c99a" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1080" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a6a30">✓ 问题解决</text>
  <text x="1080" y="235" text-anchor="middle" font-size="10" fill="#2a8a40">精度对齐</text>
  <text x="1080" y="250" text-anchor="middle" font-size="10" fill="#2a8a40">地址无冲突</text>

  <!-- Fail badge -->
  <rect x="993" y="295" width="175" height="80" rx="10" fill="#fde8e8" stroke="#f0a0a0" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1080" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a1a1a">✗ 继续排查</text>
  <text x="1080" y="345" text-anchor="middle" font-size="10" fill="#aa3030">mean_diff 异常</text>
  <text x="1080" y="360" text-anchor="middle" font-size="10" fill="#aa3030">地址冲突</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Loop back arrow: 继续排查 → 上下文收集 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Down from fail badge -->
  <path d="M 1080,377 L 1080,490 L 255,490 L 255,443"
        fill="none" stroke="#f0a0a0" stroke-width="2" stroke-dasharray="6,4"
        marker-end="url(#arrowhead-loop)"/>
  <text x="667" y="508" text-anchor="middle" font-size="10" fill="#c06060">重新分析 →</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Stage number badges -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <circle cx="50" cy="148" r="10" fill="#f0a030"/>
  <text x="50" y="152" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">1</text>

  <circle cx="205" cy="148" r="10" fill="#4aaa60"/>
  <text x="205" y="152" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">2</text>

  <circle cx="370" cy="138" r="10" fill="#4a6aee"/>
  <text x="370" y="142" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">3</text>

  <circle cx="530" cy="138" r="10" fill="#8a4aee"/>
  <text x="530" y="142" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">4</text>

  <circle cx="833" cy="148" r="10" fill="#1aaa98"/>
  <text x="833" y="152" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">5</text>

  <circle cx="1013" cy="193" r="10" fill="#2aaa50"/>
  <text x="1013" y="197" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">6</text>

</svg>
</div>
</body>
</html>
