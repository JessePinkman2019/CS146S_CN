  <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#8899bb"/>
  </marker>
  <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#d08020"/>
  </marker>
</defs>

<!-- 白底 -->
<rect width="1200" height="720" fill="#fff" rx="14"/>

<!-- 标题 -->
<text x="600" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a2a4a">/context — 上下文用量解读</text>
<text x="600" y="60" text-anchor="middle" font-size="12" fill="#7788aa">了解 200k token 窗口里装了什么 · 接续 knowledge_diagram 的三层知识体系</text>

<!-- 关联标签 -->
